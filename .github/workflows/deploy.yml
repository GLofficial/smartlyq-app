name: SmartlyQ App Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_DIR="/var/www/smartlyq-app"

            echo "==> Preparing deploy directory..."
            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown -R ubuntu:ubuntu "$DEPLOY_DIR"

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/smartlyq-app/"
          strip_components: 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "==> Checking deploy..."
            ls -la /var/www/smartlyq-app/index.html

            echo "==> Setting permissions..."
            sudo chown -R ubuntu:www-data /var/www/smartlyq-app
            sudo chmod -R 755 /var/www/smartlyq-app

            echo "==> Deployment complete!"
            echo "Files deployed:"
            ls -la /var/www/smartlyq-app/
